<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aksh Dining Hall Admin</title>
<!-- Tailwind CSS 4 -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- custom css -->
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0f0f0f] text-white">
<!-- ================= LOGIN SECTION ================= -->
<section id="loginSection" class="min-h-screen grid lg:grid-cols-2">
<!-- Left -->
<div class="relative hidden lg:flex items-center justify-center bg-black overflow-hidden">

<img 
src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1400&auto=format&fit=crop"
class="absolute w-full h-full object-cover opacity-40 animate-pulse"
>

<div class="absolute inset-0 bg-gradient-to-r from-black/80 to-black/20"></div>

<div class="relative z-10 text-center px-10 fade">
<h1 class="title-font text-6xl font-bold mb-6 text-yellow-400 floating">
Aksh Dining Hall
</h1>

<p class="text-gray-300 text-lg leading-8 max-w-xl">
Premium Restaurant Admin Panel with modern dashboard,
live analytics, reservations management and animated UI.
</p>
</div>
</div>

<!-- Right -->
<div class="flex items-center justify-center bg-[#121212] p-6">

<div class="glass w-full max-w-md rounded-3xl p-10 fade">

<div class="text-center mb-8">
<h2 class="title-font text-4xl font-bold text-yellow-400">
Admin Login
</h2>

<p class="text-gray-400 mt-3">
Welcome back administrator
</p>
</div>

<form onsubmit="login(event)" class="space-y-6">

<div>
<label class="block mb-2 text-sm text-gray-300">
Email Address
</label>

<input 
type="email"
placeholder="admin@aksh.com"
class="w-full bg-[#1d1d1d] border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-500"
>
</div>

<div>
<label class="block mb-2 text-sm text-gray-300">
Password
</label>

<input 
type="password"
placeholder="********"
class="w-full bg-[#1d1d1d] border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-500"
>
</div>

<button 
class="w-full bg-yellow-500 hover:bg-yellow-600 transition-all duration-300 py-3 rounded-xl font-semibold text-black cursor-pointer"
>
Login
</button>

</form>

<div class="grid grid-cols-2 gap-4 mt-10">

<div class="zoom rounded-2xl overflow-hidden h-40">
<img 
src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=1200&auto=format&fit=crop"
class="w-full h-full object-cover"
>
</div>

<div class="zoom rounded-2xl overflow-hidden h-40">
<img 
src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=1200&auto=format&fit=crop"
class="w-full h-full object-cover"
>
</div>

</div>

</div>

</div>
</section>
