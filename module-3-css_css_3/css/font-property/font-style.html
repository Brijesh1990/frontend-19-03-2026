<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Page Title</title>
<link rel='stylesheet' href='main.css'>
<style>
    .font-style {
        font-family: Arial, sans-serif;
        margin: 20px;
        font-size: 30px;
        /*font-weight: 700;*/
        font-weight: lighter;
        font-style: italic;
        font-display:block;
        
    }
</style>
</head>
<body>

<div class="font-style">
    <h1>Font Style</h1>
    <p>The font-style property specifies the font style for a text.</p>
    
    <h2>Values</h2>
    <ul>
        <li><strong>normal</strong> - The text is shown normally. This is default.</li>
        <li><strong>italic</strong> - The text is shown in italic.</li>
        <li><strong>oblique</strong> - The text is shown in oblique. This is similar to italic, but the letters are not as slanted as italic.</li>
    </ul>
</div>


</body>
