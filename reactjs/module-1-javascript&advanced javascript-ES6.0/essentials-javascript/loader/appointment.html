<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- custom css -->
    <link rel="stylesheet" href="css/loader.css">
    <!-- external js -->
    <script src="js/loader.js"></script> 
</head>
<body onload="mainContent()">
<div id="loader"></div>    
<main id="main-content">    
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-heart-pulse-fill"></i> PetCare
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a href="index.html" class="nav-link active">Dashboard</a></li>
                <li class="nav-item"><a href="pets.html" class="nav-link">Pets</a></li>
                <li class="nav-item"><a href="owners.html" class="nav-link">Owners</a></li>
                <li class="nav-item"><a href="appointment.html" class="nav-link">Appointments</a></li>
            </ul>
        </div>
    </div>
</nav>


<!-- Appointment Section -->
<section class="py-5 bg-light">
    <div class="container">

        <!-- Heading -->
        <div class="row mb-5">
            <div class="col text-center">
                <h2 class="fw-bold">
                    <i class="bi bi-calendar-check-fill text-primary"></i>
                    Book a Pet Appointment
                </h2>
                <p class="text-muted">
                    Schedule a visit to meet or purchase your favorite pet.
                </p>
            </div>
        </div>

        <div class="row g-4">

            <!-- Appointment Form -->
            <div class="col-lg-8">

                <div class="card shadow border-0">

                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            Appointment Details
                        </h4>
                    </div>

                    <div class="card-body">

                        <form>

                            <div class="row">

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" placeholder="Enter Full Name">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" placeholder="Enter Email">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Mobile Number</label>
                                    <input type="tel" class="form-control" placeholder="+91 9876543210">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">City</label>
                                    <input type="text" class="form-control" placeholder="Enter City">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Select Pet</label>

                                    <select class="form-select">
                                        <option>Dog</option>
                                        <option>Cat</option>
                                        <option>Rabbit</option>
                                        <option>Bird</option>
                                        <option>Fish</option>
                                        <option>Hamster</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Breed</label>

                                    <select class="form-select">
                                        <option>Labrador</option>
                                        <option>German Shepherd</option>
                                        <option>Golden Retriever</option>
                                        <option>Persian Cat</option>
                                        <option>Siamese Cat</option>
                                        <option>Rabbit</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Appointment Date</label>
                                    <input type="date" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Appointment Time</label>
                                    <input type="time" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Payment Method</label>

                                    <select class="form-select">
                                        <option>Cash</option>
                                        <option>UPI</option>
                                        <option>Credit Card</option>
                                        <option>Debit Card</option>
                                        <option>Net Banking</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Budget</label>
                                    <input type="number" class="form-control" placeholder="₹ 10000">
                                </div>

                                <div class="col-12 mb-3">
                                    <label class="form-label">Address</label>
                                    <textarea class="form-control" rows="3"></textarea>
                                </div>

                                <div class="col-12 mb-3">
                                    <label class="form-label">
                                        Additional Notes
                                    </label>

                                    <textarea class="form-control" rows="4"
                                    placeholder="Any special requirements..."></textarea>
                                </div>

                                <div class="col-12 mb-3">

                                    <div class="form-check">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               id="agree">

                                        <label class="form-check-label"
                                               for="agree">

                                            I agree to the Terms &
                                            Conditions.

                                        </label>

                                    </div>

                                </div>

                                <div class="col-12">

                                    <button class="btn btn-primary btn-lg">
                                        <i class="bi bi-calendar-check"></i>
                                        Book Appointment
                                    </button>

                                    <button type="reset"
                                            class="btn btn-outline-secondary btn-lg ms-2">
                                        Reset
                                    </button>

                                </div>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

            <!-- Appointment Summary -->
            <div class="col-lg-4">

                <div class="card shadow border-0">

                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">
                            Appointment Summary
                        </h4>
                    </div>

                    <div class="card-body">

                        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=600"
                             class="img-fluid rounded mb-3"
                             alt="Pet">

                        <h4 class="fw-bold">
                            Labrador Puppy
                        </h4>

                        <hr>

                        <p>
                            <strong>Price :</strong>
                            ₹25,000
                        </p>

                        <p>
                            <strong>Age :</strong>
                            3 Months
                        </p>

                        <p>
                            <strong>Gender :</strong>
                            Male
                        </p>

                        <p>
                            <strong>Vaccinated :</strong>

                            <span class="badge bg-success">
                                Yes
                            </span>
                        </p>

                        <p>
                            <strong>Health :</strong>

                            <span class="badge bg-primary">
                                Excellent
                            </span>
                        </p>

                        <hr>

                        <button class="btn btn-success w-100">
                            <i class="bi bi-whatsapp"></i>
                            Contact Seller
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>
</section>

<!-- Bootstrap Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>



</main>
</body>
</html>
