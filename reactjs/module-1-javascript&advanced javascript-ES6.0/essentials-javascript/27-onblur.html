<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>
<!-- Bootstrap 5.1.3 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="js/main.js"></script>
</head>
<body class="bg-light">
<section class="py-5">
<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8 col-md-10">

<div class="card shadow border-0">

<div class="card-header bg-primary text-white text-center py-3">
<h2 class="mb-0">Book Your Appointment</h2>
<p class="mb-0">Fill in the details below</p>
</div>

<div class="card-body p-4">

<form method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" id="fullName" autocomplete="on" onblur="display()" class="form-control" placeholder="Enter Full Name" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email Address</label>
<input type="email" id="email" onblur="display()" autocomplete="on" class="form-control" placeholder="Enter Email" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" autocomplete="on" class="form-control" placeholder="Enter Mobile Number" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Age</label>
<input type="number" class="form-control" placeholder="Enter Age">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Appointment Date</label>
<input type="date" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Appointment Time</label>
<input type="time" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Department</label>

<select class="form-select" id="dep" onblur="display()"  required>
<option selected disabled>Select Department</option>
<option value="general physician">General Physician</option>
<option value="cardiology">Cardiology</option>
<option>Orthopedics</option>
<option>Neurology</option>
<option>Dermatology</option>
<option>Pediatrics</option>
<option>Gynecology</option>
<option>ENT</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label class="form-label">Select Doctor</label>

<select class="form-select" id="doct" onblur="display()"  required>
<option selected disabled>Select Doctor</option>
<option value="dr. rahul sharma" >Dr. Rahul Sharma</option>
<option value="dr. neha patel">Dr. Neha Patel</option>
<option>Dr. Amit Kumar</option>
<option>Dr. Pooja Singh</option>
<option>Dr. Rakesh Mehta</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label class="form-label d-block">Gender</label>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender" id="male">
<label class="form-check-label" for="male">Male</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender" id="female">
<label class="form-check-label" for="female">Female</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender" id="other">
<label class="form-check-label" for="other">Other</label>
</div>

</div>

<div class="col-md-6 mb-3">
<label class="form-label">Appointment Type</label>

<select class="form-select" id="conc" onblur="display()">
<option value="consultation">Consultation</option>
<option value="routine checkup">Routine Checkup</option>
<option value="emergency">Emergency</option>
<option value="follow up">Follow-up</option>
<option value="vaccination">Vaccination</option>
</select>

</div>

<div class="col-12 mb-3">
<label class="form-label">Symptoms / Message</label>
<textarea class="form-control" id="syms" rows="5" onblur="display()" placeholder="Describe your problem..."></textarea>
</div>

<div class="col-12 mb-3">

<div class="form-check">
<input class="form-check-input" type="checkbox" id="check">
<label class="form-check-label" for="check">
I agree to the Terms & Conditions
</label>
</div>

</div>

<div class="col-12 text-center">

<button class="btn btn-primary btn-lg px-5">
Book Appointment
</button>

<button type="reset" class="btn btn-outline-secondary btn-lg ms-2">
Reset
</button>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
