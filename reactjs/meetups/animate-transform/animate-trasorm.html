<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
@keyframes anim {
    0%
    {
     margin: 0;
     padding: 0;
     transform: scale(1);
    }
    50%
    {
    
     margin: 0;
     padding: 0;
     transform: scale(2.5);
    }
    100%
    {
     margin: 0;
     padding: 0;
     transform: scale(1);
    }
}    
body 
{
margin: 0;
padding: 0;
overflow-x: hidden;    
}    
.app
{
width: 150px;
height: 120px;
background-color: blue;    
position: relative;
left: 45%;
margin-top: 15% !important;
animation: 2s ease-in-out infinite anim;    

}
</style>
</head>
<body>
<div class="app"></div>
</body>
</html>
